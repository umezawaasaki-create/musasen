<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚾ ムサセン ベースボールアプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#2a2a2a;--surface:#363636;--surface2:#424242;--border:#555;--gold:#f0c040;--gold2:#d4a520;--gold-dim:rgba(240,192,64,.12);--red:#e74c3c;--rb:#ff6b5b;--green:#27ae60;--gb:#2ecc71;--blue:#3498db;--text:#f5f0e0;--dim:#b0a080;--dimmer:#706050;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;overscroll-behavior:none;}
.g-hdr{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);border-bottom:2px solid var(--gold);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.g-hdr-logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px;color:var(--gold);}
.g-hdr-sub{font-size:12px;color:var(--dim);margin-top:1px;}
.g-hdr-score{text-align:center;}
.g-score-num{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:4px;line-height:1;}
.g-score-inn{font-size:10px;color:var(--gold);font-weight:700;}
.btn-summary{background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:900;padding:9px 12px;border-radius:12px;cursor:pointer;line-height:1.4;}
.main-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid var(--gold);display:flex;z-index:190;}
.mn-btn{flex:1;padding:9px 0 12px;background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Noto Sans JP',sans-serif;transition:color .2s;}
.mn-btn .ni{font-size:22px;}
.mn-btn.active{color:var(--gold);}
.screen{display:none;padding-bottom:70px;}
.screen.active{display:block;}
/* スコア入力 */
.sub-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:150;}
.sub-tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;color:var(--dim);cursor:pointer;border-bottom:2.5px solid transparent;font-weight:700;transition:all .2s;}
.sub-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.half-bar{display:flex;gap:7px;padding:7px 10px;border-bottom:1px solid var(--border);}
.half-btn{flex:1;padding:14px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.half-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
/* バッターカード型 */
.bat-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:8px 10px;padding:12px 14px;}
.bat-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bat-num{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold);min-width:28px;text-align:center;line-height:1;}
.bat-selects{display:flex;gap:8px;flex:1;}
select.sel{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:10px 8px;outline:none;font-family:'Noto Sans JP',sans-serif;flex:1;min-width:0;}
select.sel.sel-pos{flex:0 0 80px;}
.btn-daida{background:transparent;border:1px dashed var(--gold);color:var(--gold);border-radius:8px;font-size:12px;font-weight:700;padding:6px 10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;}
.bat-row-innings{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;}
.inn-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.inn-col-label{font-size:10px;color:var(--dimmer);font-weight:700;}
.res-btn{width:100%;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--dimmer);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;padding:0;display:flex;align-items:center;justify-content:center;}
.res-btn:active{transform:scale(.88);}
.res-btn.hit{background:#2a2000;border-color:var(--gold);color:var(--gold);}
.res-btn.hr{background:#2a1400;border-color:#ff8c00;color:#ff8c00;}
.res-btn.out{background:#2e0c0c;border-color:var(--red);color:var(--rb);}
.res-btn.walk{background:#102030;border-color:var(--blue);color:var(--blue);}
.res-btn.rbi-on{outline:2px solid var(--gold);}
/* 代打カード */
.daida-card{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.3);border-radius:12px;margin:4px 10px 8px 30px;padding:10px 12px;}
.daida-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.daida-label{font-size:12px;color:var(--gold);font-weight:700;white-space:nowrap;}
.btn-daida-del{background:none;border:none;color:var(--dimmer);font-size:16px;cursor:pointer;margin-left:auto;}
/* 投手 */
.pit-wrap{padding:10px;}
.p-sec{font-size:13px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:7px;}
.p-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.p-card-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.p-name-sel,.p-name-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;padding:7px 8px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.era-chip{font-family:'Bebas Neue',cursive;font-size:15px;white-space:nowrap;}
.era-chip.good{color:var(--gb);}
.era-chip.avg{color:var(--gold);}
.era-chip.bad{color:var(--rb);}
.btn-del{background:none;border:none;color:var(--dimmer);font-size:16px;cursor:pointer;}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.p-field{display:flex;flex-direction:column;gap:3px;}
.p-field label{font-size:13px;color:var(--dim);}
.p-field select,.p-field input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px;outline:none;font-family:'Noto Sans JP',sans-serif;width:100%;}
.p-inn-row{display:flex;align-items:center;gap:5px;}
.p-inn-row input{width:52px;}
.p-inn-row span{color:var(--dim);font-size:11px;}
.p-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.p-si{display:flex;flex-direction:column;align-items:center;gap:2px;}
.p-si label{font-size:12px;color:var(--dim);}
.p-si input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;padding:9px 3px;text-align:center;outline:none;font-family:'Noto Sans JP',sans-serif;}
.btn-add-p{width:100%;padding:14px;border-radius:11px;border:1px dashed var(--border);background:transparent;color:var(--dim);font-size:15px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:18px 14px 26px;width:100%;max-width:480px;animation:up .2s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:11px;color:var(--dim);margin-bottom:2px;}
.sheet-player{font-size:20px;font-weight:700;margin-bottom:14px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.ro{padding:16px 6px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);text-align:center;cursor:pointer;transition:all .15s;}
.ro:active{transform:scale(.93);}
.ro .ri{font-size:26px;margin-bottom:4px;}
.ro .rl{font-size:14px;font-weight:700;}
.ro .rs{font-size:11px;color:var(--dim);}
.ro-hit{border-color:var(--gold);background:#2a2000;}.ro-hit .rl{color:var(--gold);}
.ro-2b{border-color:var(--gold);background:#2a2000;}.ro-2b .rl{color:var(--gold);}
.ro-3b{border-color:var(--gold);background:#2a2000;}.ro-3b .rl{color:var(--gold);}
.ro-hr{border-color:#ff8c00;background:#2a1400;}.ro-hr .rl{color:#ff8c00;}
.ro-out{border-color:var(--red);background:#2e0c0c;}.ro-out .rl{color:var(--rb);}
.ro-k{border-color:var(--red);background:#2e0c0c;}.ro-k .rl{color:var(--rb);}
.ro-bb{border-color:var(--blue);background:#102030;}.ro-bb .rl{color:var(--blue);}
.ro-hbp{border-color:var(--blue);background:#102030;}.ro-hbp .rl{color:var(--blue);}
.ro-sac{border-color:var(--dim);background:#2a2a2a;}.ro-sac .rl{color:var(--dim);}
.detail-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.detail-row label{font-size:11px;color:var(--dim);white-space:nowrap;}
.detail-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.rbi-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.rbi-row label{font-size:15px;color:var(--dim);flex:1;}
.rbi-counter{display:flex;align-items:center;gap:10px;}
.rbi-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:24px;cursor:pointer;}
.rbi-num{font-family:'Bebas Neue',cursive;font-size:36px;min-width:32px;text-align:center;color:var(--gold);}
.btn-clear{width:100%;padding:14px;border-radius:11px;border:1px solid var(--red);background:transparent;color:var(--rb);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
/* サマリー */
.sum-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:350;overflow-y:auto;}
.sum-overlay.open{display:block;}
.sum-sheet{background:var(--surface);min-height:100vh;padding:14px 12px 100px;}
.sum-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sum-hdr h2{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gold);}
.btn-close-sum{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.s-sec{font-size:10px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:12px 0 7px;display:flex;align-items:center;gap:7px;}
.s-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.s-tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:10px;}
.s-tbl th{background:var(--surface2);color:var(--dimmer);font-size:9px;padding:6px 4px;}
.s-tbl td{padding:7px 4px;font-size:10px;border-top:1px solid var(--border);text-align:center;}
.s-tbl td:first-child{text-align:left;padding-left:8px;font-weight:700;}
.copy-wrap{display:flex;gap:7px;margin-bottom:8px;}
.copy-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px;font-size:10px;color:var(--text);line-height:1.9;white-space:pre-wrap;word-break:break-all;}
.btn-copy{background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:900;padding:8px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;align-self:flex-start;}
.btn-send{width:100%;padding:13px;background:var(--gold2);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:900;border-radius:11px;cursor:pointer;letter-spacing:1px;margin-top:8px;}
/* アーカイブ */
.arc-content{padding:10px 10px 20px;}
.arc-mode-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.arc-mode-btn{padding:9px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.arc-mode-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
.year-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.yr-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.yr-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
.yr-btn.all{border-color:var(--gold);color:var(--gold);}
.a-sec{font-size:13px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:7px;}
.a-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.cc-stat{text-align:center;background:var(--surface2);border-radius:6px;padding:7px 4px;}
.cc-val{font-family:'Bebas Neue',cursive;font-size:22px;}
.cc-lbl{font-size:12px;color:var(--dim);}
.team-yr-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;}
.ty-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.ty-year{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--gold);}
.ty-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.ty-st{text-align:center;background:var(--surface2);border-radius:6px;padding:7px 3px;}
.ty-val{font-family:'Bebas Neue',cursive;font-size:22px;}
.ty-lbl{font-size:12px;color:var(--dim);}
/* ランキング */
.rank-cat-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid var(--border);margin-bottom:14px;}
.rank-cat-bar::-webkit-scrollbar{display:none;}
.rank-cat-btn{padding:12px 18px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.rank-cat-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.rank-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--gold);margin-bottom:12px;}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;}
.rank-num{font-family:'Bebas Neue',cursive;font-size:32px;min-width:36px;text-align:center;line-height:1;}
.rank-num.gold{color:var(--gold);}
.rank-num.silver{color:#c0c0c0;}
.rank-num.bronze{color:#cd7f32;}
.rank-num.other{color:var(--dimmer);}
.rank-info{flex:1;}
.rank-name{font-size:17px;font-weight:700;margin-bottom:2px;}
.rank-sub{font-size:12px;color:var(--dim);}
.rank-val{font-family:'Bebas Neue',cursive;font-size:36px;text-align:right;line-height:1;}
.rank-val.gold-val{color:var(--gold);}
.rank-val.normal-val{color:var(--text);}
.rank-val-unit{font-size:12px;color:var(--dim);text-align:right;margin-top:2px;}
/* 試合リスト */
.gamelist-wrap{padding:14px 14px 20px;}
.btn-new-game{width:100%;padding:16px;background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;border-radius:14px;cursor:pointer;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:8px;}
.gamelist-sec{font-size:13px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.gamelist-sec::after{content:'';flex:1;height:1px;background:var(--border);}
/* 新規試合モーダル */
.newgame-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:flex-end;justify-content:center;}
.newgame-overlay.open{display:flex;}
.newgame-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;animation:up .22s ease;}
.newgame-sheet h3{font-size:18px;font-weight:900;margin-bottom:18px;color:var(--gold);}
.ng-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.ng-field label{font-size:13px;color:var(--dim);font-weight:700;}
.ng-field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:12px 14px;outline:none;font-family:'Noto Sans JP',sans-serif;width:100%;}
.ng-field input:focus{border-color:var(--gold);}
.btn-ng-create{width:100%;padding:15px;background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;border-radius:12px;cursor:pointer;margin-top:6px;}
.btn-ng-cancel{width:100%;padding:13px;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Noto Sans JP',sans-serif;font-size:15px;border-radius:12px;cursor:pointer;margin-top:8px;}
/* 対戦結果 */
.res-yr-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.res-yr-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;}
.res-yr-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.game-card.win{border-top:3px solid var(--gold);}
.game-card.lose{border-top:3px solid var(--rb);}
.game-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.game-date{font-size:13px;color:var(--dim);}
.game-round{font-size:12px;color:var(--dimmer);background:var(--surface2);border-radius:6px;padding:3px 8px;}
.game-row{display:flex;align-items:center;}
.game-team{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.game-team-name{font-size:12px;font-weight:700;color:var(--dim);text-align:center;}
.game-team-name.my-name{color:var(--text);}
.game-team-logo{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:'Bebas Neue',cursive;background:var(--surface2);border:2px solid var(--border);line-height:1;}
.game-team-logo.my-logo{background:rgba(240,192,64,.15);border-color:var(--gold);color:var(--gold);}
.game-team-logo.win-logo{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.4);color:var(--gold);}
.game-team-logo.lose-logo{background:var(--surface2);border-color:var(--border);color:var(--dim);}
.game-score-center{display:flex;flex-direction:column;align-items:center;padding:0 10px;flex-shrink:0;}
.game-score-nums{display:flex;align-items:center;gap:6px;}
.score-my{font-family:'Bebas Neue',cursive;font-size:48px;line-height:1;}
.score-sep{font-family:'Bebas Neue',cursive;font-size:30px;color:var(--dimmer);line-height:1;}
.score-opp{font-family:'Bebas Neue',cursive;font-size:48px;line-height:1;color:var(--dim);}
.score-my.win-score{color:var(--gold);}
.score-my.lose-score{color:var(--rb);}
.game-result-badge{font-size:12px;font-weight:900;padding:3px 12px;border-radius:10px;margin-top:4px;}
.badge-win{background:rgba(240,192,64,.2);color:var(--gold);}
.badge-lose{background:rgba(231,76,60,.15);color:var(--rb);}
.game-venue{font-size:11px;color:var(--dimmer);margin-top:8px;text-align:center;}
.game-season-header{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--gold);letter-spacing:3px;margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.game-season-header::after{content:'';flex:1;height:2px;background:linear-gradient(to right,var(--gold),transparent);}
.season-summary{display:flex;gap:8px;margin-bottom:14px;}
.ss-item{flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center;}
.ss-val{font-family:'Bebas Neue',cursive;font-size:26px;}
.ss-lbl{font-size:11px;color:var(--dim);}
</style>
</head>
<body>

function memberOptions(sel){let o='<option value="">－ 未選択 －</option>';MEMBERS.forEach(m=>{const v=m.name+'('+m.num+')';o+=`<option value="${v}"${sel===v?' selected':''}>${v}</option>`;});return o;}
function posOptions(sel){let o='<option value="">－</option>';POSITIONS.forEach(p=>o+=`<option value="${p}"${sel===p?' selected':''}>${p}</option>`);return o;}
function pitcherMemberOptions(sel){let o='<option value="">選手を選択</option><optgroup label="投手陣">';PITCHER_NUMS.forEach(n=>{const m=MEMBERS.find(x=>x.num===n);if(m){const v=m.name+'('+m.num+')';o+=`<option value="${v}"${sel===v?' selected':''}>${v}</option>`;}});o+='</optgroup><optgroup label="全選手">';MEMBERS.filter(m=>!PITCHER_NUMS.includes(m.num)).forEach(m=>{const v=m.name+'('+m.num+')';o+=`<option value="${v}"${sel===v?' selected':''}>${v}</option>`;});return o+'</optgroup>';}
function getTeamInitial(name){return /^[A-Za-z0-9]/.test(name)?name.slice(0,2).toUpperCase():name.slice(0,2);}

// SCREEN
function showScreen(name){
  ['score','archive','scoreinput'].forEach(s=>{const el=document.getElementById('screen-'+s);if(el)el.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  ['score','archive'].forEach(s=>{document.getElementById('nav-'+s).classList.toggle('active',s===name||(s==='score'&&name==='scoreinput'));});
  if(name==='archive')renderRanking();
}
// GAME LIST
function renderGameList(){
  const upEl=document.getElementById('gamelist-upcoming');
  const doneEl=document.getElementById('gamelist-done');
  if(!upEl){console.error('gamelist-upcoming not found!');return;}
  // 日付で降順ソート（新しい順）、ステータスに関わらず順番を維持
  const sorted=[...games].sort((a,b)=>{
    const da=a.date||'';const db=b.date||'';
    return db.localeCompare(da);
  });
  const upcoming=sorted.filter(g=>g.status==='upcoming'||g.status==='inprogress');
  const done=sorted.filter(g=>g.status==='done');
  upEl.innerHTML=upcoming.length?upcoming.map(g=>gameCard(g)).join(''):'<p style="color:var(--dimmer);font-size:14px;padding:10px 0;">予定されている試合はありません</p>';
  doneEl.innerHTML=done.length?done.map(g=>gameCard(g)).join(''):'<p style="color:var(--dimmer);font-size:14px;padding:10px 0;">記録済みの試合はありません</p>';
}
function gameCard(g){
  const initial=getTeamInitial(g.opp);
  const isUp=g.status==='upcoming'||g.status==='inprogress';
  const borderColor=g.status==='inprogress'?'var(--gb)':isUp?'var(--gold)':'var(--dimmer)';
  const logoStyle=isUp?'border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.1);':'';
  let scoreHtml='',badgeHtml='';
  if(g.status==='done'&&g.finalScore){const isWin=g.finalScore.my>g.finalScore.opp;scoreHtml=`<div style="font-family:'Bebas Neue',cursive;font-size:28px;color:${isWin?'var(--gold)':'var(--rb)'};">${g.finalScore.my}-${g.finalScore.opp}</div>`;badgeHtml=`<div style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:${isWin?'rgba(240,192,64,.15)':'var(--surface2)'};color:${isWin?'var(--gold)':'var(--dimmer)'};">${isWin?'WIN':'LOSE'}</div>`;}
  else if(g.status==='inprogress')badgeHtml='<div style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:rgba(46,204,113,.15);color:var(--gb);">● 進行中</div>';
  else badgeHtml='<div style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:rgba(240,192,64,.15);color:var(--gold);">予定</div>';
  return`<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid ${borderColor};border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;" onclick="openGame('${g.id}')">
    <div style="width:52px;height:52px;border-radius:12px;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;font-family:'Bebas Neue',cursive;flex-shrink:0;${logoStyle}">${initial}</div>
    <div style="flex:1;min-width:0;"><div style="font-size:17px;font-weight:700;margin-bottom:3px;">vs ${g.opp}</div><div style="font-size:12px;color:var(--dim);margin-bottom:3px;">📅 ${g.date}</div><div style="font-size:11px;color:var(--dimmer);">📍 ${g.venue}</div></div>
    <div style="text-align:right;flex-shrink:0;">${scoreHtml}${badgeHtml}</div>
  </div>`;
}
function openNewGame(){const now=new Date();now.setMinutes(0);document.getElementById('ng-date').value=now.toISOString().slice(0,16);document.getElementById('ng-opp').value='';document.getElementById('ng-venue').value='';document.getElementById('newgame-modal').classList.add('open');}
function closeNewGame(e){if(!e||e.target===document.getElementById('newgame-modal'))document.getElementById('newgame-modal').classList.remove('open');}
async function createGame(){
  const opp=document.getElementById('ng-opp').value.trim();
  const date=document.getElementById('ng-date').value;
  const venue=document.getElementById('ng-venue').value.trim();
  if(!opp){alert('対戦相手を入力してください');return;}
  const id='g_'+Date.now();
  const newGame={id,opp,date:date?date.replace('T',' ').slice(0,16):'日時未定',venue:venue||'球場未定',status:'upcoming',orders:9,scores:null,batters:null,pinchHitters:null,pitchers:null,finalScore:null};
  games.unshift(newGame);
  await saveGameToSupabase(newGame);
  closeNewGame();
  renderGameList();
}
function openGame(gameId){
  const g=games.find(x=>x.id===gameId);if(!g)return;
  currentGame=g;
  document.getElementById('game-info-disp').textContent='vs '+g.opp;
  document.getElementById('score-hdr').style.display='block';
  document.getElementById('btn-summary').style.display='block';
  ORDERS=g.orders||9;
  if(g.batters){batters=JSON.parse(JSON.stringify(g.batters));pinchHitters=JSON.parse(JSON.stringify(g.pinchHitters||{top:{},bot:{}}));}
  else{['top','bot'].forEach(h=>{batters[h]={};for(let o=1;o<=ORDERS;o++)batters[h][o]={name:'',pos:'',results:{}};});pinchHitters={top:{},bot:{}};DEFAULT_LINEUP.forEach(d=>{const m=MEMBERS.find(x=>x.num===d.num);if(m){batters.top[d.o].name=m.name+'('+m.num+')';batters.top[d.o].pos=d.pos;}});}
  if(g.scores)scores=JSON.parse(JSON.stringify(g.scores));
  else{scores={};for(let i=1;i<=INNINGS;i++)scores[i]={top:0,bot:0};}
  if(g.pitchers)pitchers=JSON.parse(JSON.stringify(g.pitchers));
  else pitchers={my:[],opp:[]};
  if(g.status==='upcoming'){g.status='inprogress';saveGameToSupabase(g);}
  showScreen('scoreinput');
  setTimeout(()=>{renderBatters();updateScoreHeader();renderPitchers('my');renderPitchers('opp');showSubTab('bat');},50);
}
async function backToGameList(){
  saveCurrentGame();
  document.getElementById('score-hdr').style.display='none';
  document.getElementById('btn-summary').style.display='none';
  document.getElementById('game-info-disp').textContent='東京スカイツリーグ';
  currentGame=null;
  await loadGames();
  showScreen('score');
}
// SCORE
function setHalf(h){curHalf=h;document.getElementById('h-top').classList.toggle('active',h==='top');document.getElementById('h-bot').classList.toggle('active',h==='bot');updateScoreHeader();renderBatters();}
function updateScoreHeader(){let my=0,opp=0;for(let i=1;i<=INNINGS;i++){my+=scores[i].top||0;opp+=scores[i].bot||0;}const myEl=document.getElementById('my-sc');const oppEl=document.getElementById('opp-sc');if(myEl)myEl.textContent=my;if(oppEl)oppEl.textContent=opp;}
// BATTERS
function makeInnRow(half,orderKey,isPinch,pidx){
  const src=isPinch?pinchHitters[half][orderKey][pidx]:batters[half][orderKey];
  if(!src)return document.createElement('div');
  const row=document.createElement('div');row.className='bat-row-innings';
  for(let i=1;i<=INNINGS;i++){
    const arr=src.results[i],abArr=Array.isArray(arr)?arr:(arr?[arr]:[]);
    const col=document.createElement('div');col.className='inn-col';
    const lbl=document.createElement('div');lbl.className='inn-col-label';lbl.textContent=i+'回';col.appendChild(lbl);
    if(abArr.length===0){const btn=document.createElement('button');btn.className='res-btn';btn.textContent='－';btn.style.color='var(--dimmer)';btn.onclick=(()=>{const _h=half,_k=orderKey,_ip=isPinch,_pi=pidx,_i=i;return()=>openModalEx(_h,_k,_ip,_pi,_i,0);})();col.appendChild(btn);}
    else{abArr.forEach((res,ab)=>{const btn=document.createElement('button');btn.className='res-btn';const t=res.type;if(['H','二塁打','三塁打'].includes(t))btn.classList.add('hit');else if(t==='本塁打')btn.classList.add('hr');else if(['凡打','三振'].includes(t))btn.classList.add('out');else if(['四球','死球'].includes(t))btn.classList.add('walk');if(res.rbi>0)btn.classList.add('rbi-on');const lmap={'H':'H','二塁打':'2B','三塁打':'3B','本塁打':'HR','凡打':res.detail?res.detail.slice(0,2):'凡','三振':'K','四球':'BB','死球':'HBP','犠打':'犠'};btn.textContent=lmap[t]||t.slice(0,2);btn.onclick=(()=>{const _h=half,_k=orderKey,_ip=isPinch,_pi=pidx,_i=i,_ab=ab;return()=>openModalEx(_h,_k,_ip,_pi,_i,_ab);})();col.appendChild(btn);});
    const addBtn=document.createElement('button');addBtn.className='res-btn';addBtn.textContent='＋';addBtn.style.cssText='color:var(--gold);border-color:var(--gold);';addBtn.onclick=(()=>{const _h=half,_k=orderKey,_ip=isPinch,_pi=pidx,_i=i,_ab=abArr.length;return()=>openModalEx(_h,_k,_ip,_pi,_i,_ab);})();col.appendChild(addBtn);}
    row.appendChild(col);
  }
  return row;
}
function renderBatters(){
  const cont=document.getElementById('bat-list');if(!cont)return;cont.innerHTML='';
  for(let o=1;o<=ORDERS;o++){
    const b=batters[curHalf][o];if(!b)continue;
    const ph=pinchHitters[curHalf][o]||[];
    const card=document.createElement('div');card.className='bat-row';
    const topRow=document.createElement('div');topRow.className='bat-row-top';
    const nd=document.createElement('div');nd.className='bat-num';nd.textContent=o;topRow.appendChild(nd);
    const selWrap=document.createElement('div');selWrap.className='bat-selects';
    const ns=document.createElement('select');ns.className='sel';ns.innerHTML=memberOptions(b.name);ns.onchange=(ord=>e=>{batters[curHalf][ord].name=e.target.value;scheduleSave();})(o);selWrap.appendChild(ns);
    const ps=document.createElement('select');ps.className='sel sel-pos';ps.innerHTML=posOptions(b.pos);ps.onchange=(ord=>e=>{batters[curHalf][ord].pos=e.target.value;scheduleSave();})(o);selWrap.appendChild(ps);
    const db=document.createElement('button');db.className='btn-daida';db.textContent='＋代打';db.onclick=(ord=>()=>addPinchHitter(curHalf,ord))(o);selWrap.appendChild(db);
    topRow.appendChild(selWrap);card.appendChild(topRow);
    card.appendChild(makeInnRow(curHalf,o,false,null));
    cont.appendChild(card);
    ph.forEach((p,pi)=>{
      const dc=document.createElement('div');dc.className='daida-card';
      const dt=document.createElement('div');dt.className='daida-card-top';
      const dlbl=document.createElement('div');dlbl.className='daida-label';dlbl.textContent='代打';dt.appendChild(dlbl);
      const dns=document.createElement('select');dns.className='sel';dns.style.flex='1';dns.innerHTML=memberOptions(p.name);dns.onchange=((_o,_pi)=>e=>{pinchHitters[curHalf][_o][_pi].name=e.target.value;scheduleSave();})(o,pi);dt.appendChild(dns);
      const dps=document.createElement('select');dps.className='sel sel-pos';dps.innerHTML=posOptions(p.pos);dps.onchange=((_o,_pi)=>e=>{pinchHitters[curHalf][_o][_pi].pos=e.target.value;scheduleSave();})(o,pi);dt.appendChild(dps);
      const del=document.createElement('button');del.className='btn-daida-del';del.textContent='✕';del.onclick=((_o,_pi)=>()=>removePinchHitter(curHalf,_o,_pi))(o,pi);dt.appendChild(del);
      dc.appendChild(dt);dc.appendChild(makeInnRow(curHalf,o,true,pi));cont.appendChild(dc);
    });
  }
  const addBtn=document.createElement('button');
  addBtn.style.cssText='width:calc(100% - 20px);margin:6px 10px 10px;padding:14px;background:transparent;border:2px dashed var(--border);border-radius:14px;color:var(--dim);font-size:16px;font-weight:700;cursor:pointer;font-family:sans-serif;';
  addBtn.textContent='＋ 打者を追加（'+(ORDERS+1)+'番）';
  addBtn.onclick=()=>{ORDERS++;['top','bot'].forEach(h=>{batters[h][ORDERS]={name:'',pos:'',results:{}};});renderBatters();};
  cont.appendChild(addBtn);
}
function addPinchHitter(half,order){if(!pinchHitters[half][order])pinchHitters[half][order]=[];pinchHitters[half][order].push({name:'',pos:'',results:{}});renderBatters();}
function removePinchHitter(half,order,pidx){pinchHitters[half][order].splice(pidx,1);renderBatters();scheduleSave();}
// MODAL
function openModal(half,order,inning,atBat=0){openModalEx(half,order,false,null,inning,atBat);}
function openModalEx(half,order,isPinch,pidx,inning,atBat=0){
  mst={half,order,isPinch,pinchIdx:pidx,inning,atBat,rbi:0,type:null};
  const src=isPinch?pinchHitters[half][order][pidx]:batters[half][order];
  const arr=src.results[inning],abArr=Array.isArray(arr)?arr:(arr?[arr]:[]),res=abArr[atBat]||null;
  if(res){mst.rbi=res.rbi||0;mst.type=res.type;}
  const abLabel=abArr.length>0?' ('+(atBat+1)+'打席目)':'';
  document.getElementById('modal-sub').textContent=(isPinch?'代打 '+src.name:order+'番 '+src.name)+' '+(half==='top'?'表':'裏')+' '+inning+'回'+abLabel;
  document.getElementById('modal-player').textContent=src.name||order+'番';
  document.getElementById('rbi-disp').textContent=mst.rbi;
  document.getElementById('res-detail').value=res?(res.detail||''):'';
  document.getElementById('res-modal').classList.add('open');
}

  const avg=T.ab>0?(T.h/T.ab).toFixed(3).replace('0.','.'):'.---';const slg=T.ab>0?((T.h+T.d+T.t*2+T.hr*3)/T.ab).toFixed(3):'---';const obp=(T.ab+T.bb+T.hbp)>0?((T.h+T.bb+T.hbp)/(T.ab+T.bb+T.hbp)).toFixed(3):'---';const ops_w=rows.reduce((a,r)=>a+r.ab,0);const ops=ops_w>0?(rows.reduce((a,r)=>a+r.ops*r.ab,0)/ops_w).toFixed(3):'---';
  let html=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;"><div class="cc-stat" style="padding:12px;"><div class="cc-val" style="color:var(--gold);font-size:28px;">${avg}</div><div class="cc-lbl">通算打率</div></div><div class="cc-stat" style="padding:12px;"><div class="cc-val" style="font-size:28px;">${ops}</div><div class="cc-lbl">通算OPS</div></div></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;"><div class="cc-stat"><div class="cc-val">${T.games}</div><div class="cc-lbl">試合</div></div><div class="cc-stat"><div class="cc-val">${T.ab}</div><div class="cc-lbl">打数</div></div><div class="cc-stat"><div class="cc-val">${T.h}</div><div class="cc-lbl">安打</div></div><div class="cc-stat"><div class="cc-val" style="color:#ff8c00;">${T.hr}</div><div class="cc-lbl">本塁打</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--gold);">${T.rbi}</div><div class="cc-lbl">打点</div></div><div class="cc-stat"><div class="cc-val">${T.d}</div><div class="cc-lbl">二塁打</div></div><div class="cc-stat"><div class="cc-val">${T.t}</div><div class="cc-lbl">三塁打</div></div><div class="cc-stat"><div class="cc-val">${T.sb}</div><div class="cc-lbl">盗塁</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--blue);">${T.bb}</div><div class="cc-lbl">四球</div></div><div class="cc-stat"><div class="cc-val">${T.hbp}</div><div class="cc-lbl">死球</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--rb);">${T.so}</div><div class="cc-lbl">三振</div></div><div class="cc-stat"><div class="cc-val">${slg}</div><div class="cc-lbl">長打率</div></div></div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:14px;">出塁率 ${obp} ／ 参加: ${rows.map(r=>r.year).join('・')}年</div>
  <div style="font-size:13px;color:var(--dim);font-weight:700;margin-bottom:10px;">年度別成績</div>
  <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:14px;"><table style="width:100%;border-collapse:collapse;min-width:400px;"><thead><tr style="background:var(--surface2);"><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">年</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">試</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打数</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">安打</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">本</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打点</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打率</th><th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">OPS</th></tr></thead><tbody>`;
  rows.sort((a,b)=>a.year-b.year).forEach(r=>{const ac=r.avg>=.350?'color:var(--gold)':r.avg>=.220?'color:var(--gb)':'color:var(--dim)';html+=`<tr style="border-top:1px solid var(--border);"><td style="padding:10px 6px;text-align:center;font-size:13px;font-weight:700;">${r.year}</td><td style="padding:10px 6px;text-align:center;font-size:13px;">${r.games}</td><td style="padding:10px 6px;text-align:center;font-size:13px;">${r.ab}</td><td style="padding:10px 6px;text-align:center;font-size:13px;">${r.h}</td><td style="padding:10px 6px;text-align:center;font-size:13px;color:#ff8c00;font-weight:700;">${r.hr}</td><td style="padding:10px 6px;text-align:center;font-size:13px;color:var(--gold);">${r.rbi}</td><td style="padding:10px 6px;text-align:center;font-family:'Bebas Neue',cursive;font-size:17px;${ac};">${r.avg.toFixed(3).replace('0.','.')}</td><td style="padding:10px 6px;text-align:center;font-family:'Bebas Neue',cursive;font-size:17px;">${r.ops.toFixed(3)}</td></tr>`;});
  html+='</tbody></table></div>';
  const pitRows=ARC_PITCHING.filter(r=>r.name+'('+r.num+')'===player);
  if(pitRows.length>0){const pt=pitRows.reduce((a,r)=>({games:a.games+r.games,ip:a.ip+r.ip*3+r.ip3,w:a.w+r.w,l:a.l+r.l,sv:a.sv+r.sv,er:a.er+r.er,so:a.so+r.so,bb:a.bb+r.bb}),{games:0,ip:0,w:0,l:0,sv:0,er:0,so:0,bb:0});const pera=pt.ip>0?((pt.er*27)/pt.ip).toFixed(2):'---';const ec=parseFloat(pera)<5?'var(--gb)':parseFloat(pera)<8?'var(--gold)':'var(--rb)';html+=`<div style="font-size:13px;color:var(--dim);font-weight:700;margin-bottom:10px;">投手通算成績</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;"><div class="cc-stat"><div class="cc-val" style="color:${ec};">${pera}</div><div class="cc-lbl">防御率</div></div><div class="cc-stat"><div class="cc-val">${pt.w}勝${pt.l}敗</div><div class="cc-lbl">勝敗</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--gb);">${pt.so}</div><div class="cc-lbl">奪三振</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--blue);">${pt.bb}</div><div class="cc-lbl">与四球</div></div></div>`;}
  document.getElementById('pm-content').innerHTML=html;
  document.getElementById('player-modal').classList.add('open');
}
function closePlayerModal(e){if(!e||e.target===document.getElementById('player-modal'))document.getElementById('player-modal').classList.remove('open');}
// RESULTS
let resYear='all';
function initResults(){const bar=document.getElementById('res-yr-bar');if(!bar)return;bar.innerHTML='';const a=document.createElement('button');a.className='res-yr-btn active';a.textContent='全年度';a.onclick=()=>setResYear('all');bar.appendChild(a);[2023,2024,2025,2026].forEach(y=>{const b=document.createElement('button');b.className='res-yr-btn';b.textContent=y+'年';b.onclick=()=>setResYear(y);bar.appendChild(b);});}
function setResYear(y){resYear=y;document.querySelectorAll('.res-yr-btn').forEach(b=>b.classList.toggle('active',b.textContent===(y==='all'?'全年度':y+'年')));renderResults();}
function renderResults(){
  const el=document.getElementById('results-list');if(!el)return;
  const filtered=resYear==='all'?GAME_RESULTS:GAME_RESULTS.filter(r=>r.year===resYear);
  const sorted=[...filtered].reverse();
  let html='',curYear=null;
  sorted.forEach(g=>{
    if(g.year!==curYear){curYear=g.year;const yg=GAME_RESULTS.filter(r=>r.year===curYear);const wins=yg.filter(r=>r.result==='勝').length;const loses=yg.filter(r=>r.result==='負').length;html+=`<div class="game-season-header">${curYear}年シーズン</div><div class="season-summary"><div class="ss-item"><div class="ss-val" style="color:var(--gold);">${wins}</div><div class="ss-lbl">勝利</div></div><div class="ss-item"><div class="ss-val" style="color:var(--rb);">${loses}</div><div class="ss-lbl">敗北</div></div><div class="ss-item"><div class="ss-val">${wins+loses}</div><div class="ss-lbl">試合</div></div><div class="ss-item"><div class="ss-val" style="color:${wins>loses?'var(--gold)':'var(--rb)'};">${Math.round(wins/(wins+loses)*100)}%</div><div class="ss-lbl">勝率</div></div></div>`;}
    const isWin=g.result==='勝';const oi=getTeamInitial(g.opp);
    html+=`<div class="game-card ${isWin?'win':'lose'}"><div class="game-meta"><div class="game-date">📅 ${g.date.replace(/\//g,'.')}</div><div class="game-round">第${g.round}回戦</div></div>
    <div class="game-row"><div class="game-team"><div class="game-team-logo my-logo">M</div><div class="game-team-name my-name">ムサセン</div></div>
    <div class="game-score-center"><div class="game-score-nums"><span class="score-my ${isWin?'win-score':'lose-score'}">${g.my}</span><span class="score-sep">-</span><span class="score-opp">${g.opp_score}</span></div><span class="game-result-badge ${isWin?'badge-win':'badge-lose'}">${isWin?'WIN':'LOSE'}</span></div>
    <div class="game-team"><div class="game-team-logo ${isWin?'win-logo':'lose-logo'}">${oi}</div><div class="game-team-name">${g.opp}</div></div></div>
    <div class="game-venue">📍 ${g.venue}</div></div>`;
  });
  el.innerHTML=html;
}
function showArcMode(name){
  ['ranking','team','results'].forEach(m=>{document.getElementById('arc-'+m).style.display=m===name?'block':'none';});
  document.getElementById('arcbtn-ranking').classList.toggle('active',name==='ranking');
  document.getElementById('arcbtn-team').classList.toggle('active',name==='team');
  document.getElementById('arcbtn-results').classList.toggle('active',name==='results');
  if(name==='ranking')renderRanking();
  if(name==='team')renderTeamYears();
  if(name==='results')renderResults();
}
</script>
</body>
</html>
