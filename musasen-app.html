<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚾ ムサセン ベースボールアプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#2a2a2a;--surface:#363636;--surface2:#424242;--border:#555;
  --gold:#f0c040;--gold2:#d4a520;--gold-dim:rgba(240,192,64,.12);
  --red:#e74c3c;--rb:#ff6b5b;--green:#27ae60;--gb:#2ecc71;
  --blue:#3498db;--text:#f5f0e0;--dim:#b0a080;--dimmer:#706050;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;overscroll-behavior:none;}

/* ===== GLOBAL HEADER ===== */
.g-hdr{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);border-bottom:2px solid var(--gold);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.g-hdr-logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px;color:var(--gold);}
.g-hdr-sub{font-size:12px;color:var(--dim);margin-top:1px;}
.g-hdr-score{text-align:center;}
.g-score-num{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:4px;line-height:1;}
.g-score-inn{font-size:10px;color:var(--gold);font-weight:700;}
.btn-summary{background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:900;padding:9px 12px;border-radius:12px;cursor:pointer;line-height:1.4;}

/* ===== BOTTOM MAIN NAV ===== */
.main-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid var(--gold);display:flex;z-index:190;}
.mn-btn{flex:1;padding:9px 0 12px;background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Noto Sans JP',sans-serif;transition:color .2s;}
.mn-btn .ni{font-size:22px;}
.mn-btn.active{color:var(--gold);}

/* ===== SCREEN ===== */
.screen{display:none;padding-bottom:70px;}
.screen.active{display:block;}

/* ===== SCORE INPUT ===== */
/* sub tabs */
.sub-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:150;}
.sub-tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;color:var(--dim);cursor:pointer;border-bottom:2.5px solid transparent;font-weight:700;transition:all .2s;}
.sub-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* inning bar */
.inn-bar{display:flex;align-items:center;gap:5px;padding:9px 10px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:96px;z-index:140;}
.inn-bar::-webkit-scrollbar{display:none;}
.inn-label{font-size:13px;color:var(--dim);white-space:nowrap;}
.inn-btn{min-width:36px;height:36px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s;}
.inn-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}

/* half */
.half-bar{display:flex;gap:7px;padding:7px 10px;border-bottom:1px solid var(--border);}
.half-btn{flex:1;padding:14px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.half-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}

/* batter grid */
.bat-scroll{overflow-x:auto;}
.bat-hdr{display:grid;grid-template-columns:26px 90px 52px 52px repeat(9,34px);gap:3px;padding:8px 10px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--dimmer);font-weight:700;min-width:560px;}
.bat-row{display:grid;grid-template-columns:26px 90px 52px 52px repeat(9,34px);gap:3px;padding:9px 10px;border-bottom:1px solid var(--border);align-items:center;min-width:560px;}
.bat-num{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--dimmer);text-align:center;}
select.sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 2px;outline:none;font-family:'Noto Sans JP',sans-serif;width:100%;}

/* result buttons */
.res-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--dimmer);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;padding:0;display:flex;align-items:center;justify-content:center;}
.res-btn:active{transform:scale(.88);}
.res-btn.hit{background:#2a2000;border-color:var(--gold);color:var(--gold);}
.res-btn.hr{background:#2a1400;border-color:#ff8c00;color:#ff8c00;}
.res-btn.out{background:#2e0c0c;border-color:var(--red);color:var(--rb);}
.res-btn.walk{background:#102030;border-color:var(--blue);color:var(--blue);}
.res-btn.rbi-on{outline:2px solid var(--gold);}

/* pitcher */
.pit-wrap{padding:10px;}
.p-sec{font-size:13px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:7px;}
.p-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.p-card-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.p-name-sel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;padding:7px 8px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.p-name-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;padding:7px 10px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.era-chip{font-family:'Bebas Neue',cursive;font-size:15px;white-space:nowrap;}
.era-chip.good{color:var(--gb);}
.era-chip.avg{color:var(--gold);}
.era-chip.bad{color:var(--rb);}
.btn-del{background:none;border:none;color:var(--dimmer);font-size:16px;cursor:pointer;}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.p-field{display:flex;flex-direction:column;gap:3px;}
.p-field label{font-size:13px;color:var(--dim);}
.p-field select,.p-field input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px;outline:none;font-family:'Noto Sans JP',sans-serif;width:100%;}
.p-inn-row{display:flex;align-items:center;gap:5px;}
.p-inn-row input{width:52px;}
.p-inn-row span{color:var(--dim);font-size:11px;}
.p-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.p-si{display:flex;flex-direction:column;align-items:center;gap:2px;}
.p-si label{font-size:12px;color:var(--dim);}
.p-si input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;padding:9px 3px;text-align:center;outline:none;font-family:'Noto Sans JP',sans-serif;}
.btn-add-p{width:100%;padding:14px;border-radius:11px;border:1px dashed var(--border);background:transparent;color:var(--dim);font-size:15px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* ===== RESULT MODAL ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:18px 14px 26px;width:100%;max-width:480px;animation:up .2s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:11px;color:var(--dim);margin-bottom:2px;}
.sheet-player{font-size:20px;font-weight:700;margin-bottom:14px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.ro{padding:16px 6px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);text-align:center;cursor:pointer;transition:all .15s;}
.ro:active{transform:scale(.93);}
.ro .ri{font-size:26px;margin-bottom:4px;}
.ro .rl{font-size:14px;font-weight:700;}
.ro .rs{font-size:11px;color:var(--dim);}
.ro-hit{border-color:var(--gold);background:#2a2000;}.ro-hit .rl{color:var(--gold);}
.ro-2b{border-color:var(--gold);background:#2a2000;}.ro-2b .rl{color:var(--gold);}
.ro-3b{border-color:var(--gold);background:#2a2000;}.ro-3b .rl{color:var(--gold);}
.ro-hr{border-color:#ff8c00;background:#2a1400;}.ro-hr .rl{color:#ff8c00;}
.ro-out{border-color:var(--red);background:#2e0c0c;}.ro-out .rl{color:var(--rb);}
.ro-k{border-color:var(--red);background:#2e0c0c;}.ro-k .rl{color:var(--rb);}
.ro-bb{border-color:var(--blue);background:#102030;}.ro-bb .rl{color:var(--blue);}
.ro-hbp{border-color:var(--blue);background:#102030;}.ro-hbp .rl{color:var(--blue);}
.ro-sac{border-color:var(--dim);background:#2a2a2a;}.ro-sac .rl{color:var(--dim);}
.detail-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.detail-row label{font-size:11px;color:var(--dim);white-space:nowrap;}
.detail-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.rbi-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.rbi-row label{font-size:15px;color:var(--dim);flex:1;}
.rbi-counter{display:flex;align-items:center;gap:10px;}
.rbi-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:24px;cursor:pointer;}
.rbi-num{font-family:'Bebas Neue',cursive;font-size:36px;min-width:32px;text-align:center;color:var(--gold);}
.btn-clear{width:100%;padding:14px;border-radius:11px;border:1px solid var(--red);background:transparent;color:var(--rb);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* ===== SUMMARY MODAL ===== */
.sum-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:350;overflow-y:auto;}
.sum-overlay.open{display:block;}
.sum-sheet{background:var(--surface);min-height:100vh;padding:14px 12px 100px;}
.sum-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sum-hdr h2{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gold);}
.btn-close-sum{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.s-sec{font-size:10px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:12px 0 7px;display:flex;align-items:center;gap:7px;}
.s-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.s-tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:10px;}
.s-tbl th{background:var(--surface2);color:var(--dimmer);font-size:9px;padding:6px 4px;}
.s-tbl td{padding:7px 4px;font-size:10px;border-top:1px solid var(--border);text-align:center;}
.s-tbl td:first-child{text-align:left;padding-left:8px;font-weight:700;}
.copy-wrap{display:flex;gap:7px;margin-bottom:8px;}
.copy-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px;font-size:10px;color:var(--text);line-height:1.9;white-space:pre-wrap;word-break:break-all;}
.btn-copy{background:var(--gold);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:900;padding:8px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;align-self:flex-start;}
.btn-send{width:100%;padding:13px;background:var(--gold2);border:none;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:900;border-radius:11px;cursor:pointer;letter-spacing:1px;margin-top:8px;}

/* ===== ARCHIVE ===== */
.arc-content{padding:10px 10px 20px;}
.arc-mode-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.arc-mode-btn{padding:9px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.arc-mode-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
.year-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.yr-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.yr-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:900;}
.yr-btn.all{border-color:var(--gold);color:var(--gold);}
.yr-btn.all.active{background:var(--gold);color:#1a1a1a;font-weight:900;}
.a-sec{font-size:13px;color:var(--dim);letter-spacing:1.5px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:7px;}
.a-sec::after{content:'';flex:1;height:1px;background:var(--border);}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:14px;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{background:var(--surface2);color:var(--dimmer);font-size:12px;padding:9px 6px;text-align:center;letter-spacing:.5px;white-space:nowrap;}
td{padding:10px 6px;font-size:13px;text-align:center;border-top:1px solid var(--border);}
tr:hover td{background:rgba(240,192,64,.05);}
.td-name{text-align:left;padding-left:9px;font-weight:700;white-space:nowrap;}
.td-avg{font-family:'Bebas Neue',cursive;font-size:18px;}
.avg-hi{color:var(--gold);}
.avg-mid{color:var(--gb);}
.avg-lo{color:var(--dim);}
.td-hr{color:#ff8c00;font-weight:700;}
.td-rbi{color:var(--gold);}
.td-k{color:var(--rb);}
.td-bb{color:var(--blue);}
.td-era{font-family:'Bebas Neue',cursive;font-size:17px;}
.era-good{color:var(--gb);}
.era-avg{color:var(--gold);}
.era-bad{color:var(--rb);}

.yr-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--dim);margin-left:3px;}
.player-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pl-btn{padding:8px 14px;border-radius:18px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-size:13px;cursor:pointer;transition:all .15s;}
.pl-btn.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:700;}

.cc-stat{text-align:center;background:var(--surface2);border-radius:6px;padding:7px 4px;}
.cc-val{font-family:'Bebas Neue',cursive;font-size:22px;}
.cc-lbl{font-size:12px;color:var(--dim);}
.team-yr-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;}
.ty-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.ty-year{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--gold);}
.ty-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.ty-st{text-align:center;background:var(--surface2);border-radius:6px;padding:7px 3px;}
.ty-val{font-family:'Bebas Neue',cursive;font-size:22px;}
.ty-lbl{font-size:12px;color:var(--dim);}

/* ===== RANKING ===== */
.rank-cat-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid var(--border);margin-bottom:14px;}
.rank-cat-bar::-webkit-scrollbar{display:none;}
.rank-cat-btn{padding:12px 18px;border-radius:0;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.rank-cat-btn.active{background:transparent;color:var(--gold);border-bottom-color:var(--gold);}
.rank-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--gold);margin-bottom:12px;padding-left:2px;}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:background .15s;}
.rank-card.me{background:var(--gold-dim);border-color:var(--gold);}
.rank-num{font-family:'Bebas Neue',cursive;font-size:32px;min-width:36px;text-align:center;line-height:1;}
.rank-num.gold{color:var(--gold);}
.rank-num.silver{color:#c0c0c0;}
.rank-num.bronze{color:#cd7f32;}
.rank-num.other{color:var(--dimmer);}
.rank-info{flex:1;}
.rank-name{font-size:17px;font-weight:700;margin-bottom:2px;}
.rank-sub{font-size:12px;color:var(--dim);}
.rank-val{font-family:'Bebas Neue',cursive;font-size:36px;text-align:right;line-height:1;}
.rank-val.gold-val{color:var(--gold);}
.rank-val.normal-val{color:var(--text);}
.rank-val-unit{font-size:12px;color:var(--dim);text-align:right;margin-top:2px;}
</style>
</head>
<body>

<!-- GLOBAL HEADER -->
<div class="g-hdr">
  <div>
    <div class="g-hdr-logo">⚾ MUSASEN</div>
    <div class="g-hdr-sub" id="game-info-disp">東京スカイツリーグ</div>
  </div>
  <div class="g-hdr-score" id="score-hdr" style="display:none;">
    <div class="g-score-num"><span id="my-sc">0</span>－<span id="opp-sc">0</span></div>
    <div class="g-score-inn" id="inn-disp">1回表</div>
  </div>
  <button class="btn-summary" id="btn-summary" onclick="openSummary()" style="display:none;">転記用<br>まとめ</button>
</div>

<!-- ===== SCREEN: SCORE INPUT ===== -->
<div id="screen-score" class="screen active">

  <!-- Sub tabs -->
  <div class="sub-tabs">
    <div class="sub-tab active" onclick="showSubTab('bat')">⚾ 打撃入力</div>
    <div class="sub-tab" onclick="showSubTab('pit')">🎽 投手入力</div>
  </div>

  <!-- BATTING -->
  <div id="subtab-bat">
    <div class="inn-bar">
      <span class="inn-label">回:</span>
      <div id="inn-tabs" style="display:flex;gap:5px;"></div>
    </div>
    <div class="half-bar">
      <button class="half-btn active" id="h-top" onclick="setHalf('top')">🔺 表（ムサセン攻撃）</button>
      <button class="half-btn" id="h-bot" onclick="setHalf('bot')">🔻 裏（相手攻撃）</button>
    </div>
    <div class="bat-scroll">
      <div class="bat-hdr">
        <div>#</div><div>選手名</div><div>守備</div><div>代打</div>
        <div style="text-align:center">1</div><div style="text-align:center">2</div>
        <div style="text-align:center">3</div><div style="text-align:center">4</div>
        <div style="text-align:center">5</div><div style="text-align:center">6</div>
        <div style="text-align:center">7</div><div style="text-align:center">8</div>
        <div style="text-align:center">9</div>
      </div>
      <div id="bat-list"></div>
    </div>
  </div>

  <!-- PITCHER -->
  <div id="subtab-pit" style="display:none;">
    <div class="pit-wrap">
      <div class="p-sec">ムサセン投手陣</div>
      <div id="my-pitchers"></div>
      <button class="btn-add-p" onclick="addPitcher('my')">＋ 投手を追加</button>
      <div class="p-sec" style="margin-top:16px;">相手チーム投手陣</div>
      <div id="opp-pitchers"></div>
      <button class="btn-add-p" onclick="addPitcher('opp')">＋ 投手を追加</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: ARCHIVE ===== -->
<div id="screen-archive" class="screen">
  <div class="arc-content">
    <!-- Archive mode tabs: 2つのみ -->
    <div class="arc-mode-bar">
      <button class="arc-mode-btn active" id="arcbtn-ranking" onclick="showArcMode('ranking')">🏆 ランキング</button>
      <button class="arc-mode-btn" id="arcbtn-team" onclick="showArcMode('team')">📊 チーム成績</button>
    </div>

    <!-- RANKING (メイン) -->
    <div id="arc-ranking">
      <div class="rank-cat-bar" id="rank-cat-bar"></div>
      <div class="year-bar" id="rank-year-bar"></div>
      <div class="rank-title" id="rank-title">打率ランキング</div>

}

}

function showScreen(name){
  ['score','archive'].forEach(s=>{
    document.getElementById('screen-'+s).classList.toggle('active',s===name);

  });
  if(name==='archive'){
    renderRanking();
  }
}

// ============================================================

function buildInnTabs(){
  const c=document.getElementById('inn-tabs'); c.innerHTML='';
  for(let i=1;i<=INNINGS;i++){const b=document.createElement('button');b.className='inn-btn'+(i===curInning?' active':'');b.textContent=i;b.onclick=(n=>()=>setInning(n))(i);c.appendChild(b);}
}
function setInning(n){curInning=n;document.querySelectorAll('.inn-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));updateScoreHeader();renderBatters();}
function setHalf(h){curHalf=h;document.getElementById('h-top').classList.toggle('active',h==='top');document.getElementById('h-bot').classList.toggle('active',h==='bot');updateScoreHeader();renderBatters();}
function updateScoreHeader(){
  document.getElementById('inn-disp').textContent=curInning+'回'+(curHalf==='top'?'表':'裏');
  let my=0,opp=0;for(let i=1;i<=INNINGS;i++){my+=scores[i].top||0;opp+=scores[i].bot||0;}
  document.getElementById('my-sc').textContent=my;document.getElementById('opp-sc').textContent=opp;
}

    const nd=document.createElement('div');nd.className='bat-num';nd.textContent=o;row.appendChild(nd);
    const ns=document.createElement('select');ns.className='sel';ns.innerHTML=memberOptions(b.name);ns.onchange=(ord=>e=>{batters[curHalf][ord].name=e.target.value;})(o);row.appendChild(ns);
    const ps=document.createElement('select');ps.className='sel';ps.innerHTML=posOptions(b.pos);ps.onchange=(ord=>e=>{batters[curHalf][ord].pos=e.target.value;})(o);row.appendChild(ps);
    const ss=document.createElement('select');ss.className='sel';ss.innerHTML=memberOptions(b.sub||'');ss.onchange=(ord=>e=>{batters[curHalf][ord].sub=e.target.value;})(o);row.appendChild(ss);
    for(let i=1;i<=INNINGS;i++){
      const arr=b.results[i],abArr=Array.isArray(arr)?arr:(arr?[arr]:[]);
      const cell=document.createElement('div');cell.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;min-width:30px;';
      if(abArr.length===0){
        const btn=document.createElement('button');btn.className='res-btn';btn.textContent=i;btn.style.color='var(--dimmer)';
        btn.onclick=((inn,ord,half)=>()=>openModal(half,ord,inn,0))(i,o,curHalf);cell.appendChild(btn);
      } else {
        abArr.forEach((res,ab)=>{
          const btn=document.createElement('button');btn.className='res-btn';
          const t=res.type;
          if(['H','二塁打','三塁打'].includes(t))btn.classList.add('hit');
          else if(t==='本塁打')btn.classList.add('hr');
          else if(['凡打','三振'].includes(t))btn.classList.add('out');
          else if(['四球','死球'].includes(t))btn.classList.add('walk');
          if(res.rbi>0)btn.classList.add('rbi-on');
          const lmap={'H':'H','二塁打':'2B','三塁打':'3B','本塁打':'HR','凡打':res.detail?res.detail.slice(0,2):'凡','三振':'K','四球':'BB','死球':'HBP','犠打':'犠'};
          btn.textContent=lmap[t]||t.slice(0,2);
          btn.onclick=((inn,ord,half,a)=>()=>openModal(half,ord,inn,a))(i,o,curHalf,ab);cell.appendChild(btn);
        });
        const addBtn=document.createElement('button');addBtn.className='res-btn';addBtn.textContent='＋';addBtn.style.cssText='color:var(--gold);border-color:var(--gold);font-size:11px;';
        addBtn.onclick=((inn,ord,half,ab)=>()=>openModal(half,ord,inn,ab))(i,o,curHalf,abArr.length);cell.appendChild(addBtn);
      }
      row.appendChild(cell);
    }
    cont.appendChild(row);
  }
}

function openModal(half,order,inning,atBat=0){
  mst={half,order,inning,atBat,rbi:0,type:null};
  const b=batters[half][order],arr=b.results[inning],abArr=Array.isArray(arr)?arr:(arr?[arr]:[]),res=abArr[atBat]||null;
  if(res){mst.rbi=res.rbi||0;mst.type=res.type;}
  const abLabel=abArr.length>0?' ('+(atBat+1)+'打席目)':'';
  document.getElementById('modal-sub').textContent=order+'番 '+(half==='top'?'表':'裏')+' '+inning+'回'+abLabel;
  document.getElementById('modal-player').textContent=b.name||order+'番';
  document.getElementById('rbi-disp').textContent=mst.rbi;
  document.getElementById('res-detail').value=res?(res.detail||''):'';
  document.getElementById('res-modal').classList.add('open');
}
function closeModal(e){document.getElementById('res-modal').classList.remove('open');}
function pickRes(type){
  const{half,order,inning,atBat}=mst;mst.type=type;
  const detail=document.getElementById('res-detail').value.trim();
  const b=batters[half][order];let arr=b.results[inning];
  if(!Array.isArray(arr))arr=arr?[arr]:[];
  arr[atBat]={type,detail,rbi:mst.rbi};b.results[inning]=arr;
  recalcScore(half,inning);closeModal();renderBatters();updateScoreHeader();
}
function chgRbi(d){
  mst.rbi=Math.max(0,(mst.rbi||0)+d);document.getElementById('rbi-disp').textContent=mst.rbi;
  if(mst.type){const{half,order,inning,atBat}=mst,b=batters[half][order],arr=b.results[inning];if(Array.isArray(arr)&&arr[atBat])arr[atBat].rbi=mst.rbi;recalcScore(half,inning);updateScoreHeader();}
}
function clearRes(){
  const{half,order,inning,atBat}=mst,b=batters[half][order];let arr=b.results[inning];
  if(Array.isArray(arr)){arr.splice(atBat,1);if(arr.length===0)delete b.results[inning];else b.results[inning]=arr;}else{delete b.results[inning];}
  recalcScore(half,inning);closeModal();renderBatters();updateScoreHeader();
}
function recalcScore(half,inning){
  let t=0;for(let o=1;o<=ORDERS;o++){const arr=batters[half][o].results[inning];if(!arr)continue;(Array.isArray(arr)?arr:[arr]).forEach(r=>{t+=r.rbi||0;});}
  scores[inning][half]=t;
}

  if(pitRows.length>0){
    const pt=pitRows.reduce((a,r)=>({games:a.games+r.games,ip:a.ip+r.ip*3+r.ip3,w:a.w+r.w,l:a.l+r.l,sv:a.sv+r.sv,er:a.er+r.er,so:a.so+r.so,bb:a.bb+r.bb}),{games:0,ip:0,w:0,l:0,sv:0,er:0,so:0,bb:0});
    const pera=pt.ip>0?((pt.er*27)/pt.ip).toFixed(2):'---';
    html+=`<div class="a-sec">投手通算</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:14px;"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;"><div class="cc-stat"><div class="cc-val ${parseFloat(pera)<5?'era-good':parseFloat(pera)<8?'era-avg':'era-bad'}">${pera}</div><div class="cc-lbl">通算防御率</div></div><div class="cc-stat"><div class="cc-val">${pt.w}勝${pt.l}敗</div><div class="cc-lbl">勝敗</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--gb)">${pt.so}</div><div class="cc-lbl">奪三振</div></div><div class="cc-stat"><div class="cc-val" style="color:var(--blue)">${pt.bb}</div><div class="cc-lbl">与四球</div></div></div></div>`;
  }
  document.getElementById('career-detail').innerHTML=html;
}
function renderTeamYears(){
  const el = document.getElementById('team-year-list');
  if(!el){ console.warn('team-year-list not found'); return; }
  el.innerHTML = [...TEAM_YEARS].reverse().map(t => {
    const winColor = t.w > t.l ? 'var(--gold)' : 'var(--rb)';
    const eraColor = t.era < 6 ? 'var(--gb)' : t.era < 8 ? 'var(--gold)' : 'var(--rb)';
    return `<div class="team-yr-card">
      <div class="ty-hdr">
        <div class="ty-year">${t.year}年シーズン</div>
        <div style="font-size:16px;font-weight:900;color:${winColor};">${t.w}勝 ${t.l}敗 ${t.d}分</div>
      </div>
      <div class="ty-stats">
        <div class="ty-st"><div class="ty-val" style="color:var(--gold);">${t.avg.toFixed(3).replace('0.','.')}</div><div class="ty-lbl">チーム打率</div></div>
        <div class="ty-st"><div class="ty-val" style="color:var(--gold);">${t.r}</div><div class="ty-lbl">総得点</div></div>
        <div class="ty-st"><div class="ty-val" style="color:${eraColor};">${t.era.toFixed(2)}</div><div class="ty-lbl">チーム防御率</div></div>
        <div class="ty-st"><div class="ty-val" style="color:var(--gb);">${t.so}</div><div class="ty-lbl">奪三振</div></div>
        <div class="ty-st"><div class="ty-val">${t.slg.toFixed(3)}</div><div class="ty-lbl">長打率</div></div>
        <div class="ty-st"><div class="ty-val">${t.obp.toFixed(3)}</div><div class="ty-lbl">出塁率</div></div>
        <div class="ty-st"><div class="ty-val">${t.ops.toFixed(3)}</div><div class="ty-lbl">OPS</div></div>

  }).join('');
}


// ============================================================
// PLAYER DETAIL MODAL
// ============================================================
function openPlayerModal(player){
  const rows = ARC_BATTING.filter(r => r.name+'('+r.num+')' === player);
  if(!rows.length) return;
  const isMe = rows[0].me;
  document.getElementById('pm-name').textContent = player;

  const T = rows.reduce((a,r)=>({
    games:a.games+r.games, ab:a.ab+r.ab, h:a.h+r.h,
    d:a.d+r.d, t:a.t+r.t, hr:a.hr+r.hr, rbi:a.rbi+r.rbi,
    bb:a.bb+r.bb, hbp:a.hbp+r.hbp, so:a.so+r.so, sb:a.sb+r.sb
  }), {games:0,ab:0,h:0,d:0,t:0,hr:0,rbi:0,bb:0,hbp:0,so:0,sb:0});
  const avg = T.ab>0?(T.h/T.ab).toFixed(3).replace('0.','.'):'---';
  const slg = T.ab>0?((T.h+T.d+T.t*2+T.hr*3)/T.ab).toFixed(3):'---';
  const obp = (T.ab+T.bb+T.hbp)>0?((T.h+T.bb+T.hbp)/(T.ab+T.bb+T.hbp)).toFixed(3):'---';
  const ops_w = rows.reduce((a,r)=>a+r.ab,0);
  const ops = ops_w>0?(rows.reduce((a,r)=>a+r.ops*r.ab,0)/ops_w).toFixed(3):'---';

  let html = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
      <div class="cc-stat" style="padding:12px;"><div class="cc-val" style="color:var(--gold);font-size:28px;">${avg}</div><div class="cc-lbl">通算打率</div></div>
      <div class="cc-stat" style="padding:12px;"><div class="cc-val" style="font-size:28px;">${ops}</div><div class="cc-lbl">通算OPS</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;">
      <div class="cc-stat"><div class="cc-val">${T.games}</div><div class="cc-lbl">試合</div></div>
      <div class="cc-stat"><div class="cc-val">${T.ab}</div><div class="cc-lbl">打数</div></div>
      <div class="cc-stat"><div class="cc-val">${T.h}</div><div class="cc-lbl">安打</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:#ff8c00;">${T.hr}</div><div class="cc-lbl">本塁打</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:var(--gold);">${T.rbi}</div><div class="cc-lbl">打点</div></div>
      <div class="cc-stat"><div class="cc-val">${T.d}</div><div class="cc-lbl">二塁打</div></div>
      <div class="cc-stat"><div class="cc-val">${T.t}</div><div class="cc-lbl">三塁打</div></div>
      <div class="cc-stat"><div class="cc-val">${T.sb}</div><div class="cc-lbl">盗塁</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:var(--blue);">${T.bb}</div><div class="cc-lbl">四球</div></div>
      <div class="cc-stat"><div class="cc-val">${T.hbp}</div><div class="cc-lbl">死球</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:var(--rb);">${T.so}</div><div class="cc-lbl">三振</div></div>
      <div class="cc-stat"><div class="cc-val">${slg}</div><div class="cc-lbl">長打率</div></div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px;">出塁率 ${obp} ／ 参加: ${rows.map(r=>r.year).join('・')}年</div>
    <div style="font-size:13px;color:var(--dim);font-weight:700;letter-spacing:1px;margin-bottom:10px;">年度別成績</div>`;

  // 年度別テーブル
  html += `<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:14px;">
    <table style="width:100%;border-collapse:collapse;min-width:400px;">
      <thead><tr style="background:var(--surface2);">
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">年</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">試</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打数</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">安打</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">本</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打点</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">四球</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">三振</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">打率</th>
        <th style="padding:9px 6px;font-size:12px;color:var(--dimmer);">OPS</th>
      </tr></thead>
      <tbody>`;
  rows.sort((a,b)=>a.year-b.year).forEach(r => {
    const ac = r.avg>=.350?'color:var(--gold)':r.avg>=.220?'color:var(--gb)':'color:var(--dim)';
    html += `<tr style="border-top:1px solid var(--border);">
      <td style="padding:10px 6px;text-align:center;font-size:13px;font-weight:700;">${r.year}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;">${r.games}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;">${r.ab}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;">${r.h}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;color:#ff8c00;font-weight:700;">${r.hr}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;color:var(--gold);">${r.rbi}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;color:var(--blue);">${r.bb}</td>
      <td style="padding:10px 6px;text-align:center;font-size:13px;color:var(--rb);">${r.so}</td>
      <td style="padding:10px 6px;text-align:center;font-family:'Bebas Neue',cursive;font-size:17px;${ac};">${r.avg.toFixed(3).replace('0.','.')}</td>
      <td style="padding:10px 6px;text-align:center;font-family:'Bebas Neue',cursive;font-size:17px;">${r.ops.toFixed(3)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  // 投手成績があれば
  const pitRows = ARC_PITCHING.filter(r => r.name+'('+r.num+')' === player);
  if(pitRows.length > 0){
    const pt = pitRows.reduce((a,r)=>({
      games:a.games+r.games, ip:a.ip+r.ip*3+r.ip3,
      w:a.w+r.w, l:a.l+r.l, sv:a.sv+r.sv,
      er:a.er+r.er, so:a.so+r.so, bb:a.bb+r.bb, h:a.h+r.h
    }),{games:0,ip:0,w:0,l:0,sv:0,er:0,so:0,bb:0,h:0});
    const pera = pt.ip>0?((pt.er*27)/pt.ip).toFixed(2):'---';
    const eraColor = parseFloat(pera)<5?'var(--gb)':parseFloat(pera)<8?'var(--gold)':'var(--rb)';
    html += `<div style="font-size:13px;color:var(--dim);font-weight:700;letter-spacing:1px;margin-bottom:10px;">投手通算成績</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;">
      <div class="cc-stat"><div class="cc-val" style="color:${eraColor};">${pera}</div><div class="cc-lbl">防御率</div></div>
      <div class="cc-stat"><div class="cc-val">${pt.w}勝${pt.l}敗</div><div class="cc-lbl">勝敗</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:var(--gb);">${pt.so}</div><div class="cc-lbl">奪三振</div></div>
      <div class="cc-stat"><div class="cc-val" style="color:var(--blue);">${pt.bb}</div><div class="cc-lbl">与四球</div></div>
    </div>`;
  }

  document.getElementById('pm-content').innerHTML = html;
  document.getElementById('player-modal').classList.add('open');
}
function closePlayerModal(e){
  if(!e || e.target === document.getElementById('player-modal')){
    document.getElementById('player-modal').classList.remove('open');
  }
}

// ============================================================
// RANKING
// ============================================================
const RANK_CATS = [
  {key:'avg',   label:'打率',   fmt:v=>v.toFixed(3).replace('0.','.'), unit:'', color:'gold-val', minAb:5},
  {key:'games', label:'試合数', fmt:v=>v, unit:'試合', color:'normal-val', minAb:0},
  {key:'h',     label:'安打',   fmt:v=>v, unit:'本', color:'normal-val', minAb:0},
  {key:'d',     label:'二塁打', fmt:v=>v, unit:'本', color:'normal-val', minAb:0},
  {key:'t',     label:'三塁打', fmt:v=>v, unit:'本', color:'normal-val', minAb:0},
  {key:'hr',    label:'本塁打', fmt:v=>v, unit:'本', color:'normal-val', minAb:0},
  {key:'rbi',   label:'打点',   fmt:v=>v, unit:'点', color:'normal-val', minAb:0},
  {key:'bb',    label:'四球',   fmt:v=>v, unit:'個', color:'normal-val', minAb:0},
  {key:'hbp',   label:'死球',   fmt:v=>v, unit:'個', color:'normal-val', minAb:0},
  {key:'so',    label:'三振',   fmt:v=>v, unit:'個', color:'normal-val', minAb:0},
  {key:'sb',    label:'盗塁',   fmt:v=>v, unit:'個', color:'normal-val', minAb:0},
  {key:'ops',   label:'OPS',   fmt:v=>v.toFixed(3), unit:'', color:'gold-val', minAb:5},
];
let rankCatIdx = 0, rankYear = 'all';

function initRanking(){
  // カテゴリボタン
  const bar = document.getElementById('rank-cat-bar');
  bar.innerHTML = '';
  RANK_CATS.forEach((c,i) => {
    const b = document.createElement('button');
    b.className = 'rank-cat-btn' + (i===0?' active':'');
    b.textContent = c.label;
    b.onclick = () => { rankCatIdx=i; document.querySelectorAll('.rank-cat-btn').forEach((btn,j)=>btn.classList.toggle('active',j===i)); renderRanking(); };
    bar.appendChild(b);
  });
  // 年度バー
  const ybar = document.getElementById('rank-year-bar');
  ybar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'yr-btn all active'; allBtn.textContent = '全年度';
  allBtn.onclick = () => setRankYear('all'); ybar.appendChild(allBtn);
  ARC_YEARS.forEach(y => {
    const b = document.createElement('button'); b.className='yr-btn'; b.textContent=y+'年';
    b.onclick = () => setRankYear(y); ybar.appendChild(b);
  });
}
function setRankYear(y){
  rankYear = y;
  document.querySelectorAll('#rank-year-bar .yr-btn').forEach(b => {
    b.classList.toggle('active', b.textContent===(y==='all'?'全年度':y+'年'));
  });
  renderRanking();
}
function renderRanking(){
  const cat = RANK_CATS[rankCatIdx];
  document.getElementById('rank-title').textContent = cat.label + 'ランキング';
  // データを集計（同選手の複数年は合算 or 選択年のみ）
  let data;
  if(rankYear === 'all'){
    // 全年度：選手ごとに合算（打率・OPSは加重平均）
    const map = {};
    ARC_BATTING.forEach(r => {
      const key = r.name+'('+r.num+')';
      if(!map[key]) map[key] = {name:r.name,num:r.num,me:r.me,games:0,ab:0,h:0,d:0,t:0,hr:0,rbi:0,bb:0,hbp:0,so:0,sb:0,ops_sum:0,ops_w:0};
      const m = map[key];
      m.games+=r.games; m.ab+=r.ab; m.h+=r.h; m.d+=r.d; m.t+=r.t; m.hr+=r.hr;
      m.rbi+=r.rbi; m.bb+=r.bb; m.hbp+=r.hbp; m.so+=r.so; m.sb+=r.sb;
      m.ops_sum += r.ops * r.ab; m.ops_w += r.ab;
    });
    data = Object.values(map).map(m => ({
      ...m,
      avg: m.ab>0 ? m.h/m.ab : 0,
      ops: m.ops_w>0 ? m.ops_sum/m.ops_w : 0,
    }));
  } else {
    data = ARC_BATTING.filter(r=>r.year===rankYear);
  }
  // minAb フィルター（打率・OPS）
  if(cat.minAb > 0) data = data.filter(r => r.ab >= cat.minAb);
  // ソート（三振は昇順、他は降順）
  const asc = cat.key === 'so';
  data = [...data].sort((a,b) => asc ? a[cat.key]-b[cat.key] : b[cat.key]-a[cat.key]);
  // 描画
  const list = document.getElementById('rank-list');
  list.innerHTML = data.map((r,i) => {
    const numClass = i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    const subYears = rankYear==='all'
      ? ARC_BATTING.filter(x=>x.name+'('+x.num+')'===r.name+'('+r.num+')').map(x=>x.year).join('・')+'年'
      : r.year+'年';
    const val = r[cat.key];
    const dispVal = cat.fmt(val);
    const playerKey = r.name+'('+r.num+')';
    return `<div class="rank-card" onclick="openPlayerModal('${playerKey}')" style="cursor:pointer;">
      <div class="rank-num ${numClass}">${i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${r.name}(${r.num})</div>
        <div class="rank-sub">${subYears} / ${r.games}試合 ${r.ab}打数</div>
      </div>
      <div>
        <div class="rank-val ${cat.color}">${dispVal}</div>
        <div class="rank-val-unit">${cat.unit}</div>
      </div>
    </div>`;
  }).join('') || '<p style="color:var(--dim);font-size:14px;padding:20px;">データがありません</p>';
}

function showArcMode(name){
  ['ranking','team'].forEach(m=>{document.getElementById('arc-'+m).style.display=m===name?'block':'none';});
  document.getElementById('arcbtn-ranking').classList.toggle('active',name==='ranking');
  document.getElementById('arcbtn-team').classList.toggle('active',name==='team');
  if(name==='ranking') renderRanking();
  if(name==='team') renderTeamYears();
}
</script>
